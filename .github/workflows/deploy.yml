name: Build and Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install website dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Build website assets
        run: npm run build

      - name: Run launch checks
        run: npm run check

  deploy:
    name: Deploy Firebase
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check Firebase deploy secret
        id: firebase_secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LUBAN_WORKSHOP_RESTAURANT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::notice::Skipping Firebase deploy because FIREBASE_SERVICE_ACCOUNT_LUBAN_WORKSHOP_RESTAURANT is not configured. Build checks already passed."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "Firebase deploy secret is configured; continuing with deployment."
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.firebase_secret.outputs.configured == 'true'
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: steps.firebase_secret.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install website dependencies
        if: steps.firebase_secret.outputs.configured == 'true'
        run: npm ci

      - name: Install functions dependencies
        if: steps.firebase_secret.outputs.configured == 'true'
        run: npm --prefix functions ci

      - name: Build website assets
        if: steps.firebase_secret.outputs.configured == 'true'
        run: npm run build

      - name: Run launch checks
        if: steps.firebase_secret.outputs.configured == 'true'
        run: npm run check

      - name: Write Firebase service account
        if: steps.firebase_secret.outputs.configured == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LUBAN_WORKSHOP_RESTAURANT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy to Firebase
        if: steps.firebase_secret.outputs.configured == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools@latest deploy --project luban-workshop-restaurant --only hosting,functions,firestore,storage --non-interactive
