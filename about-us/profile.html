    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Team Profile | Luban Workshop Restaurant</title>
    <meta name="description" content="Individual staff profile at Luban Workshop Restaurant.">

    <link rel="apple-touch-icon" sizes="180x180" href="../logo.png">

    <style>
        body { font-family: 'Lato', sans-serif; background-color: #fafaf9; color: #1c1917; }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

        nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.97); box-shadow: 0 2px 8px rgba(0,0,0,.1); z-index: 50; }
        nav > div { max-width: 72rem; margin: 0 auto; padding: 0 1rem; display: flex; justify-content: space-between; align-items: center; height: 4rem; }
        nav a.brand { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        nav .brand span { font-size: 1.1rem; font-weight: 700; color: #1c1917; }
        nav .brand span em { color: #b91c1c; font-style: normal; }
        nav .nav-links { display: flex; gap: 1rem; align-items: center; }
        nav .nav-links a { color: #57534e; font-size: 0.875rem; font-weight: 500; text-decoration: none; transition: color 0.2s; }
        nav .nav-links a:hover { color: #b91c1c; }

        .profile-hero { padding-top: 4rem; background: linear-gradient(135deg, #1c1917 0%, #7f1d1d 60%, #b91c1c 100%); }
        .profile-hero > div { max-width: 72rem; margin: 0 auto; padding: 2.5rem 1rem 0; }

        .profile-card { max-width: 56rem; margin: -3rem auto 0; position: relative; z-index: 10; padding: 0 1rem 3rem; }

        .card-inner { background: #fff; border-radius: 1.5rem; box-shadow: 0 8px 32px rgba(0,0,0,.12); overflow: hidden; }
        .card-top { display: flex; flex-direction: column; align-items: center; padding: 2.5rem 2rem 1.5rem; text-align: center; }
        @media (min-width: 640px) { .card-top { flex-direction: row; text-align: left; gap: 2rem; } }

        .avatar-wrap { flex-shrink: 0; }
        .avatar-wrap img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid #fca5a5; box-shadow: 0 4px 16px rgba(185,28,28,0.2); }
        .avatar-wrap .avatar-placeholder { width: 140px; height: 140px; border-radius: 50%; background: linear-gradient(135deg, #fef2f2, #fee2e2); display: flex; align-items: center; justify-content: center; border: 4px solid #fca5a5; }
        .avatar-wrap .avatar-placeholder svg { width: 64px; height: 64px; color: #fca5a5; }

        .profile-info { flex: 1; }
        .dept-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; background: #fee2e2; color: #b91c1c; padding: 0.2rem 0.65rem; border-radius: 9999px; margin-bottom: 0.5rem; }
        .profile-info h1 { font-size: 1.75rem; font-weight: 700; color: #1c1917; line-height: 1.2; margin-bottom: 0.3rem; }
        .profile-info .role { font-size: 0.95rem; color: #b91c1c; font-weight: 600; margin-bottom: 0.5rem; }
        .profile-info .since { font-size: 0.8rem; color: #a8a29e; display: flex; align-items: center; gap: 0.3rem; }

        .social-links { display: flex; gap: 0.75rem; margin-top: 1rem; justify-content: center; }
        @media (min-width: 640px) { .social-links { justify-content: flex-start; } }
        .social-links a { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: #fee2e2; color: #b91c1c; text-decoration: none; transition: background 0.2s; }
        .social-links a:hover { background: #b91c1c; color: #fff; }
        .social-links svg { width: 16px; height: 16px; display: block; }

        .card-body { padding: 0 2rem 2rem; }
        .divider { height: 1px; background: #f5f5f4; margin: 0 -2rem 1.5rem; }

        .bio-section { margin-bottom: 1.5rem; }
        .bio-section h2 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #b91c1c; margin-bottom: 0.65rem; }
        .bio-section p { font-size: 0.9rem; color: #57534e; line-height: 1.75; }

        .facts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .fact-item { background: #fff9f9; border-left: 3px solid #fca5a5; border-radius: 0.5rem; padding: 0.85rem 1rem; }
        .fact-item .fact-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #a8a29e; margin-bottom: 0.2rem; }
        .fact-item .fact-value { font-size: 0.9rem; font-weight: 600; color: #1c1917; }
    </style>

<body>

    <div data-luban-header="back" data-luban-header-home="../index.html" data-luban-header-back-href="index.html" data-luban-header-back-label="Back to Team"></div>
    <script src="../assets/js/site-header.js"></script>

    <!-- Hero strip -->
    <div class="profile-hero">
        <div>
            <a href="index.html" style="display:inline-flex;align-items:center;gap:0.4rem;color:#fca5a5;font-size:0.82rem;text-decoration:none;">
                <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back to Team
            </a>
            <div style="height:4rem;"></div>
        </div>
    </div>

    <!-- Profile Card -->
    <div class="profile-card">
        <div class="card-inner">

            <!-- Top: Avatar + Name -->
            <div class="card-top">
                <div class="avatar-wrap">
                    <div id="avatar-container">
                        <!-- Photo or placeholder rendered by JS -->
                        <div class="avatar-placeholder">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </div>
                    </div>
                </div>
                <div class="profile-info">
                    <span class="dept-badge" id="dept-badge">Department</span>
                    <h1 class="serif" id="profile-name">Staff Member</h1>
                    <p class="role" id="profile-role">Position</p>
                    <p class="since" id="profile-since">
                        <i data-lucide="calendar" style="width:13px;height:13px;"></i>
                        <span></span>
                    </p>
                    <div class="social-links" id="social-links"></div>
                </div>
            </div>

            <!-- Body -->
            <div class="card-body">
                <div class="divider"></div>

                <!-- Short bio -->
                <div class="bio-section" id="short-bio-section">
                    <h2>About</h2>
                    <p id="short-bio-text">Loading…</p>
                </div>

                <!-- Full bio -->
                <div class="bio-section" id="full-bio-section" style="display:none;">
                    <div class="divider"></div>
                    <h2>Background</h2>
                    <p id="full-bio-text"></p>
                </div>

                <!-- Facts grid -->
                <div class="facts-grid" id="facts-grid"></div>

                <!-- CTA -->
                <div style="background:#fff9f9;border-radius:0.75rem;padding:1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-top:0.5rem;">
                    <div>
                        <p style="font-size:0.88rem;font-weight:600;color:#1c1917;margin-bottom:0.2rem;">Dine with us</p>
                        <p style="font-size:0.8rem;color:#78716c;">Mon – Fri · 11:00 – 17:30 · Cape Coast, Ghana</p>
                    </div>
                    <a href="../index.html#reservation" style="background:#b91c1c;color:#fff;font-weight:600;font-size:0.85rem;padding:0.55rem 1.25rem;border-radius:9999px;text-decoration:none;">
                        Reserve a Table
                    </a>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <div data-luban-footer></div>
    <script src="../assets/js/site-footer.js"></script>

    <script>
        lucide.createIcons();
        // Approved profiles are loaded from Firestore; static examples are intentionally avoided.
        var profiles = {};

        var deptColours = {
            'Kitchen': '#fee2e2',
            'Service': '#fef3c7',
            'Management': '#e0f2fe',
            'Committee': '#f3e8ff'
        };
        var deptTextColours = {
            'Kitchen': '#b91c1c',
            'Service': '#b45309',
            'Management': '#0369a1',
            'Committee': '#7e22ce'
        };

        initLubanFirebase(firebase);
        var db = firebase.firestore();

        function formatDepartment(dept) {
            var value = String(dept || 'Staff').trim();
            if (!value) return 'Staff';
            return value.charAt(0).toUpperCase() + value.slice(1).toLowerCase();
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function escapeAttr(str) {
            return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function safePhotoUrl(str) {
            var value = String(str || '').trim();
            if (/^https?:\/\//i.test(value) || /^data:image\//i.test(value)) return value;
            return '';
        }

        function safeLinkUrl(str) {
            var value = String(str || '').trim();
            if (/^https?:\/\//i.test(value)) return value;
            return '';
        }

        function socialIconSvg(type) {
            var icons = {
                linkedin: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="currentColor"><path d="M6.94 8.95H3.7V20h3.24V8.95zM5.32 4a1.88 1.88 0 1 0 0 3.76A1.88 1.88 0 0 0 5.32 4zM20.3 13.66c0-3.14-1.67-4.6-3.9-4.6-1.8 0-2.6.99-3.05 1.69v-1.8h-3.1c.04 1.03 0 11.05 0 11.05h3.24v-6.17c0-.33.02-.66.12-.9.26-.66.86-1.35 1.87-1.35 1.32 0 1.85 1.01 1.85 2.48V20h3.24l-.27-6.34z"/></svg>',
                instagram: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="2"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.4" cy="6.6" r="1.2" fill="currentColor" stroke="none"/></svg>',
                twitter: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 5l14 14M19 5L5 19"/></svg>'
            };
            return icons[type] || '';
        }

        function showNotFound() {
            document.getElementById('profile-name').textContent = 'Profile Not Found';
            document.getElementById('profile-role').textContent = '';
            document.getElementById('dept-badge').textContent = 'Team';
            document.getElementById('profile-since').style.display = 'none';
            document.getElementById('short-bio-text').textContent = 'This profile does not exist or is not approved yet. Please return to the team page.';
            document.getElementById('full-bio-section').style.display = 'none';
            document.getElementById('facts-grid').innerHTML = '';
            document.getElementById('social-links').innerHTML = '';
            lucide.createIcons();
        }

        function normalizeFirestoreProfile(doc) {
            var d = doc.data();
            var fullName = ((d.firstName || '') + ' ' + (d.lastName || '')).trim();
            var dept = formatDepartment(d.department);

            return {
                name: d.preferredName || fullName || 'Staff Member',
                role: d.jobTitle || '',
                dept: dept,
                since: null,
                shortBio: d.shortBio || '',
                fullBio: d.fullBio || '',
                funFact: d.funFact || '',
                favouriteDish: d.favouriteDish || '',
                photo: d.photo || null,
                linkedin: d.linkedin || null,
                instagram: d.instagram || null,
                twitter: d.twitter || null,
                employmentStatus: d.employmentStatus || ''
            };
        }

        function renderProfile(p) {
            document.title = p.name + ' | Luban Workshop Restaurant';
            document.getElementById('profile-name').textContent = p.name;
            document.getElementById('profile-role').textContent = p.role;

            var badge = document.getElementById('dept-badge');
            badge.textContent = p.dept;
            badge.style.background = deptColours[p.dept] || '#fee2e2';
            badge.style.color = deptTextColours[p.dept] || '#b91c1c';

            if (p.since) {
                document.getElementById('profile-since').querySelector('span').textContent = 'With us since ' + p.since;
            } else {
                document.getElementById('profile-since').style.display = 'none';
            }

            document.getElementById('short-bio-text').textContent = p.shortBio;

            if (p.fullBio) {
                document.getElementById('full-bio-section').style.display = 'block';
                document.getElementById('full-bio-text').textContent = p.fullBio;
            } else {
                document.getElementById('full-bio-section').style.display = 'none';
            }

            var safePhoto = safePhotoUrl(p.photo);
            if (safePhoto) {
                document.getElementById('avatar-container').innerHTML = '<img src="' + escapeAttr(safePhoto) + '" alt="' + escapeAttr(p.name) + '">';
            }

            // Social links
            var socialHtml = '';
            var safeLinkedin = safeLinkUrl(p.linkedin);
            var safeInstagram = safeLinkUrl(p.instagram);
            var safeTwitter = safeLinkUrl(p.twitter);
            if (safeLinkedin) socialHtml += '<a href="' + escapeAttr(safeLinkedin) + '" target="_blank" rel="noopener" title="LinkedIn" aria-label="LinkedIn">' + socialIconSvg('linkedin') + '</a>';
            if (safeInstagram) socialHtml += '<a href="' + escapeAttr(safeInstagram) + '" target="_blank" rel="noopener" title="Instagram" aria-label="Instagram">' + socialIconSvg('instagram') + '</a>';
            if (safeTwitter) socialHtml += '<a href="' + escapeAttr(safeTwitter) + '" target="_blank" rel="noopener" title="Twitter / X" aria-label="Twitter / X">' + socialIconSvg('twitter') + '</a>';
            document.getElementById('social-links').innerHTML = socialHtml;

            // Facts grid
            var facts = [];
            if (p.dept) facts.push({ label: 'Department', value: p.dept });
            if (p.role) facts.push({ label: 'Position', value: p.role });
            if (p.since) facts.push({ label: 'Member Since', value: p.since });
            if (p.employmentStatus) facts.push({ label: 'Employment', value: p.employmentStatus });
            if (p.favouriteDish) facts.push({ label: 'Favourite Dish', value: p.favouriteDish });
            if (p.funFact) facts.push({ label: 'Fun Fact', value: p.funFact });

            var factsGrid = document.getElementById('facts-grid');
            factsGrid.innerHTML = facts.map(function(f) {
                return '<div class="fact-item"><div class="fact-label">' + escapeHtml(f.label) + '</div><div class="fact-value">' + escapeHtml(f.value) + '</div></div>';
            }).join('');

            lucide.createIcons();
        }

        function loadProfile() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id') || '';

            if (profiles[id]) {
                renderProfile(profiles[id]);
                return;
            }

            db.collection('teamProfiles').doc(id).get()
                .then(function(doc) {
                    if (!doc.exists) {
                        showNotFound();
                        return;
                    }

                    var data = doc.data();
                    if (!data || data.status !== 'approved') {
                        showNotFound();
                        return;
                    }

                    renderProfile(normalizeFirestoreProfile(doc));
                })
                .catch(function(err) {
                    console.warn('Could not load profile:', err && err.message ? err.message : err);
                    showNotFound();
                });
        }

        loadProfile();
    </script>

    <script src="../assets/js/cookie-consent.js" defer></script>
</body>
</html>
