<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luban Workshop Restaurant – Under Maintenance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #f5f0e8;
      font-family: Georgia, 'Times New Roman', serif;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: #c8a96e;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: normal;
      margin-bottom: 1.2rem;
      color: #f5f0e8;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #bbb;
    }

    .divider {
      width: 50px;
      height: 2px;
      background: #c8a96e;
      margin: 2rem auto;
    }

    .tagline {
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: #c8a96e;
      margin-top: 2.5rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Luban Workshop</div>
    <div class="subtitle">Restaurant &amp; Dining · Cape Coast, Ghana</div>

    <h1>We'll Be Back Soon</h1>
    <div class="divider"></div>
    <p>
      Our website is currently undergoing maintenance.<br>
      We're working hard behind the scenes to bring you<br>
      an even better experience.
    </p>
    <p class="tagline">Stay tuned — we'll be live again very soon.</p>
  </div>
</body>
</html>
