<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Menu | Luban Workshop Restaurant</title>
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="description" content="Private special event menu for Luban Workshop Restaurant guests.">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="tailwind.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="assets/js/lucide.bundle.js"></script>
    <script src="assets/js/firebase-modular.bundle.js"></script>
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background:
                linear-gradient(180deg, rgba(28,25,23,0.82), rgba(28,25,23,0.96)),
                url('restcon.png') center/cover fixed;
            color: #1c1917;
        }

        .serif,
        h1,
        h2,
        h3 {
            font-family: 'Playfair Display', serif;
        }

        .menu-shell {
            min-height: 100vh;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-page {
            width: min(100%, 920px);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.35);
        }

        .menu-hero {
            background: #1c1917;
            color: #fff;
            padding: clamp(1.5rem, 5vw, 3rem);
            position: relative;
            overflow: hidden;
        }

        .menu-hero::after {
            content: "";
            position: absolute;
            inset: auto -10% -40% 30%;
            height: 15rem;
            background: radial-gradient(circle, rgba(185, 28, 28, 0.34), transparent 64%);
        }

        .menu-hero-content {
            position: relative;
            z-index: 1;
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .brand-row img {
            width: 3rem;
            height: 3rem;
            border-radius: 999px;
            background: #fff;
            object-fit: contain;
        }

        .kicker {
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: #fca5a5;
            font-size: 0.74rem;
            font-weight: 800;
        }

        h1 {
            margin-top: 0.5rem;
            font-size: clamp(2.25rem, 8vw, 4.6rem);
            line-height: 0.98;
            font-weight: 700;
        }

        .guest-note {
            margin-top: 1rem;
            max-width: 42rem;
            color: #e7e5e4;
            line-height: 1.7;
        }

        .menu-content {
            padding: clamp(1.25rem, 4vw, 2.25rem);
        }

        .menu-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .menu-meta span {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            border: 1px solid #e7e5e4;
            border-radius: 999px;
            padding: 0.55rem 0.8rem;
            color: #57534e;
            font-size: 0.86rem;
            font-weight: 700;
            background: #fafaf9;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 0.9rem;
        }

        .menu-item {
            border: 1px solid #e7e5e4;
            border-radius: 8px;
            padding: 1rem;
            background: #fff;
        }

        .menu-item-top {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-start;
        }

        .menu-item h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1c1917;
            line-height: 1.2;
        }

        .menu-item-price {
            color: #b91c1c;
            font-weight: 900;
            white-space: nowrap;
        }

        .menu-item-category {
            display: inline-flex;
            margin-top: 0.65rem;
            padding: 0.25rem 0.55rem;
            border-radius: 999px;
            background: #fee2e2;
            color: #991b1b;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .menu-item p {
            color: #57534e;
            margin-top: 0.75rem;
            line-height: 1.6;
            font-size: 0.92rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1.5rem;
        }

        .empty-state i {
            color: #b91c1c;
            width: 2.5rem;
            height: 2.5rem;
            margin: 0 auto 1rem;
        }

        .footer-note {
            margin-top: 1.5rem;
            border-top: 1px solid #e7e5e4;
            padding-top: 1rem;
            color: #78716c;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <main class="menu-shell">
        <article class="menu-page">
            <section class="menu-hero">
                <div class="menu-hero-content">
                    <div class="brand-row">
                        <img src="logo.png" alt="Luban Workshop logo">
                        <div>
                            <p class="kicker">Luban Workshop Restaurant</p>
                            <p style="color:#d6d3d1;font-size:0.9rem;">Private event menu</p>
                        </div>
                    </div>
                    <p class="kicker" id="event-date-label">Special Menu</p>
                    <h1 id="special-menu-title">Loading menu</h1>
                    <p id="special-menu-note" class="guest-note">Please wait while we prepare your event menu.</p>
                </div>
            </section>

            <section class="menu-content">
                <div id="menu-loaded" class="hidden">
                    <div class="menu-meta">
                        <span><i data-lucide="utensils" style="width:16px;height:16px;"></i><span id="item-count">0 items</span></span>
                        <span><i data-lucide="qr-code" style="width:16px;height:16px;"></i>QR menu</span>
                    </div>
                    <div id="special-menu-items" class="items-grid"></div>
                    <p class="footer-note">Prices and availability are prepared for this event menu only.</p>
                </div>

                <div id="menu-empty" class="empty-state">
                    <i data-lucide="loader" class="animate-spin"></i>
                    <h2 class="serif" style="font-size:1.6rem;font-weight:700;">Loading special menu</h2>
                    <p style="color:#57534e;margin-top:0.5rem;">If this takes too long, please ask a Luban Workshop team member for help.</p>
                </div>
            </section>
        </article>
    </main>

    <script>
        lucide.createIcons();

        const firebaseConfig = {
            apiKey: "AIzaSyDxgdwU84vFNoCOUTl-HRdGYonLIcDaXFw",
            authDomain: "luban-workshop-restaurant.firebaseapp.com",
            projectId: "luban-workshop-restaurant",
            storageBucket: "luban-workshop-restaurant.firebasestorage.app",
            messagingSenderId: "360623290287",
            appId: "1:360623290287:web:89fae5ebbb342e5e13e15a"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPrice(value) {
            const amount = Number(value);
            if (!Number.isFinite(amount)) return '';
            return 'GHS ' + amount.toFixed(2).replace(/\.00$/, '');
        }

        function showEmptyState(title, message, icon) {
            document.getElementById('menu-loaded').classList.add('hidden');
            const empty = document.getElementById('menu-empty');
            empty.innerHTML = `
                <i data-lucide="${icon || 'circle-alert'}"></i>
                <h2 class="serif" style="font-size:1.6rem;font-weight:700;">${escapeHtml(title)}</h2>
                <p style="color:#57534e;margin-top:0.5rem;">${escapeHtml(message)}</p>
            `;
            empty.classList.remove('hidden');
            lucide.createIcons();
        }

        async function loadSpecialMenu() {
            const params = new URLSearchParams(window.location.search);
            const menuId = params.get('menu');

            if (!menuId) {
                showEmptyState('No menu selected', 'This QR code is missing its special menu code.', 'qr-code');
                return;
            }

            try {
                const doc = await db.collection('specialMenus').doc(menuId).get();
                if (!doc.exists) {
                    showEmptyState('Menu not available', 'This special menu is not active or the link has expired.', 'utensils-crossed');
                    return;
                }

                const data = doc.data() || {};
                const items = Array.isArray(data.items) ? data.items : [];

                document.title = (data.title || 'Special Menu') + ' | Luban Workshop Restaurant';
                document.getElementById('special-menu-title').textContent = data.title || 'Special Menu';
                document.getElementById('special-menu-note').textContent = data.note || 'A custom menu prepared for today\'s event guests.';
                document.getElementById('event-date-label').textContent = data.eventDate ? 'Special Menu - ' + data.eventDate : 'Special Menu';
                document.getElementById('item-count').textContent = items.length + (items.length === 1 ? ' item' : ' items');

                if (!items.length) {
                    showEmptyState('Menu is being prepared', 'No items have been added to this special menu yet.', 'chef-hat');
                    return;
                }

                document.getElementById('special-menu-items').innerHTML = items.map(item => `
                    <article class="menu-item">
                        <div class="menu-item-top">
                            <h2>${escapeHtml(item.name || 'Special item')}</h2>
                            ${item.price !== null && item.price !== undefined && item.price !== '' ? `<span class="menu-item-price">${escapeHtml(formatPrice(item.price))}</span>` : ''}
                        </div>
                        ${item.category ? `<span class="menu-item-category">${escapeHtml(item.category)}</span>` : ''}
                        ${item.description ? `<p>${escapeHtml(item.description)}</p>` : ''}
                    </article>
                `).join('');

                document.getElementById('menu-empty').classList.add('hidden');
                document.getElementById('menu-loaded').classList.remove('hidden');
                lucide.createIcons();
            } catch (error) {
                console.error('Failed to load special menu:', error);
                showEmptyState('Menu not available', 'This special menu could not be loaded. Please ask the event host for help.', 'circle-alert');
            }
        }

        loadSpecialMenu();
    </script>
    <script src="assets/js/cookie-consent.js" defer></script>
</body>

</html>
