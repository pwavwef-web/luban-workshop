<!DOCTYPE html>
<html lang="zh-Hans">

<head>
  <script type="text/plain" data-cookieconsent="analytics" data-src="https://www.googletagmanager.com/gtag/js?id=G-8LVTFZH7VD"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 | 鲁班工坊餐厅</title>
  <meta name="description" content="联系鲁班工坊餐厅。电话 020 543 8455，或通过表单留言。营业时间：周一至周五 11:00–17:30。">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../logo.png">
  <link rel="stylesheet" href="../tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <script src="../assets/js/lucide.bundle.js"></script>
  <script src="../assets/js/firebase-firestore.bundle.js"></script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; }
    h1, h2, h3, .serif { font-family: 'Noto Serif SC', serif; }
  </style>
</head>

<body class="bg-stone-50 text-stone-800 antialiased">
  <nav class="w-full bg-white/95 backdrop-blur-sm shadow-md z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="flex items-center gap-2">
          <img src="../logo.png" alt="鲁班工坊标志" class="h-10 w-10 rounded-full object-contain bg-white">
          <span class="serif font-bold text-xl tracking-tight text-stone-900">鲁班工坊</span>
        </a>
        <div class="flex gap-4 text-sm">
          <a href="index.html" class="text-stone-600 hover:text-red-700">首页</a>
          <a href="menu.html" class="text-stone-600 hover:text-red-700">菜单</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <h1 class="serif text-4xl font-bold text-stone-900 mb-2">联系我们</h1>
    <p class="text-stone-500 text-sm mb-10">欢迎咨询预订、活动合作或其他问题，我们会尽快回复您。</p>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
      <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-6 text-center">
        <i data-lucide="phone" class="h-8 w-8 text-red-700 mb-3 mx-auto"></i>
        <h3 class="font-semibold text-stone-900 mb-1">电话</h3>
        <p class="text-stone-600 text-sm">020 543 8455</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-6 text-center">
        <i data-lucide="mail" class="h-8 w-8 text-red-700 mb-3 mx-auto"></i>
        <h3 class="font-semibold text-stone-900 mb-1">邮箱</h3>
        <p class="text-stone-600 text-sm"><a href="mailto:reservations@lubanrestaurant.com" class="text-red-700 hover:underline">reservations@lubanrestaurant.com</a></p>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-6 text-center">
        <i data-lucide="map-pin" class="h-8 w-8 text-red-700 mb-3 mx-auto"></i>
        <h3 class="font-semibold text-stone-900 mb-1">地址</h3>
        <p class="text-stone-600 text-sm">Cafe Roof Top<br>Casford Street, UCC</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-6 text-center">
        <i data-lucide="clock" class="h-8 w-8 text-red-700 mb-3 mx-auto"></i>
        <h3 class="font-semibold text-stone-900 mb-1">营业时间</h3>
        <p class="text-stone-600 text-sm">周一至周五 11:00 – 17:30</p>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-8">
      <h2 class="serif text-2xl font-bold text-stone-900 mb-6">在线留言</h2>
      <form id="contact-form" class="space-y-5">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1" for="contact-name">姓名</label>
            <input type="text" id="contact-name" required class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-red-700 focus:outline-none text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1" for="contact-email">邮箱</label>
            <input type="email" id="contact-email" required class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-red-700 focus:outline-none text-sm">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1" for="contact-subject">主题</label>
          <input type="text" id="contact-subject" required class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-red-700 focus:outline-none text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1" for="contact-message">留言内容</label>
          <textarea id="contact-message" rows="5" required class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-red-700 focus:outline-none text-sm resize-none"></textarea>
        </div>

        <div id="form-error" class="hidden text-red-700 text-sm p-3 bg-red-50 rounded-md"></div>

        <button type="submit" id="submit-btn" class="w-full bg-red-700 text-white py-3 rounded-md hover:bg-red-800 transition-colors font-medium">
          发送留言
        </button>
      </form>

      <div id="form-success" class="hidden text-center py-8">
        <i data-lucide="check-circle" class="h-12 w-12 text-green-600 mx-auto mb-4"></i>
        <h3 class="serif text-xl font-bold text-stone-900 mb-2">提交成功</h3>
        <p class="text-stone-600">感谢您的留言，我们会尽快与您联系。</p>
        <button onclick="resetForm()" class="mt-6 text-red-700 hover:text-red-800 font-medium text-sm underline">再发一条</button>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <div data-luban-footer></div>
  <script src="../assets/js/site-footer.js"></script>

  <script>
    lucide.createIcons();

    const firebaseConfig = {
      apiKey: "AIzaSyDxgdwU84vFNoCOUTl-HRdGYonLIcDaXFw",
      authDomain: "luban-workshop-restaurant.firebaseapp.com",
      projectId: "luban-workshop-restaurant",
      storageBucket: "luban-workshop-restaurant.firebasestorage.app",
      messagingSenderId: "360623290287",
      appId: "1:360623290287:web:89fae5ebbb342e5e13e15a"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorDiv = document.getElementById('form-error');
      btn.disabled = true;
      btn.textContent = '发送中...';
      errorDiv.classList.add('hidden');

      const name = document.getElementById('contact-name').value.trim();
      const email = document.getElementById('contact-email').value.trim();
      const subject = document.getElementById('contact-subject').value.trim();
      const message = document.getElementById('contact-message').value.trim();

      try {
        await db.collection('contact_messages').add({
          name,
          email,
          subject,
          message,
          read: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          locale: 'zh-Hans'
        });
        document.getElementById('contact-form').classList.add('hidden');
        document.getElementById('form-success').classList.remove('hidden');
        lucide.createIcons();
      } catch (err) {
        console.error('发送失败:', err);
        errorDiv.textContent = '发送失败，请稍后重试。';
        errorDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '发送留言';
      }
    });

    function resetForm() {
      document.getElementById('contact-form').reset();
      document.getElementById('contact-form').classList.remove('hidden');
      document.getElementById('form-success').classList.add('hidden');
      const btn = document.getElementById('submit-btn');
      btn.disabled = false;
      btn.textContent = '发送留言';
    }
  </script>
  <script type="module" src="../assets/js/firebase-ai-chatbot.js?v=20260523-usercontext1"></script>
  <script src="../assets/js/cookie-consent.js" defer></script>
</body>

</html>
